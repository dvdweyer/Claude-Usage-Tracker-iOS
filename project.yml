name: ClaudeUsageIOS
options:
  bundleIdPrefix: org.afaik.claudeusagetracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_BITCODE: "NO"
    CODE_SIGN_IDENTITY: "Apple Development"

schemes:
  ClaudeUsageIOS:
    build:
      targets:
        ClaudeUsageIOS: all
        ClaudeUsageWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:

  ClaudeUsageIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ClaudeUsageIOS
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    resources:
      - ClaudeUsageIOS/Resources/Assets.xcassets
      - ClaudeUsageIOS/Resources/PrivacyInfo.xcprivacy
    info:
      path: ClaudeUsageIOS/Resources/Info.plist
      properties:
        CFBundleVersion: "13"
        CFBundleShortVersionString: "1.0"
    entitlements:
      path: ClaudeUsageIOS/ClaudeUsageIOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.afaik.claudeusagetracker.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - target: ClaudeUsageWidget
        embed: true

  ClaudeUsageWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ClaudeUsageWidget
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    info:
      path: ClaudeUsageWidget/Info.plist
      properties:
        CFBundleVersion: "13"
        CFBundleShortVersionString: "1.0"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ClaudeUsageWidget/ClaudeUsageWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.afaik.claudeusagetracker.ios.widget
        APPLICATION_EXTENSION_API_ONLY: "YES"
        CODE_SIGN_IDENTITY: "Apple Development"
